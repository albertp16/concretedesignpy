{% extends "base.html" %}
{% block title %}Rebar Layout - ConcreteDesignPy{% endblock %}

{% block content %}
<div class="calc-page">
    <a href="/" class="back-link">&larr; All Calculators</a>
    <h1>Rebar Layout Generator</h1>
    <p class="ref">Rectangular Section Rebar Coordinate Layout</p>

    <form id="calc-form" class="calc-form">
        <div class="form-section">
            <h3>Section</h3>
            <div class="form-row">
                <div class="form-group"><label>Width (mm)</label><input type="number" name="width" value="450" required></div>
                <div class="form-group"><label>Height (mm)</label><input type="number" name="height" value="600" required></div>
                <div class="form-group"><label>Cover (mm)</label><input type="number" name="cover" value="40" required></div>
            </div>
        </div>

        <div class="form-section">
            <h3>Reinforcement</h3>
            <div class="form-row">
                <div class="form-group"><label>Stirrup dia, ds (mm)</label><input type="number" name="ds" value="10" required></div>
                <div class="form-group"><label>Main bar dia, db (mm)</label><input type="number" name="db" value="25" required></div>
                <div class="form-group"><label>Bars along width (nx)</label><input type="number" name="nx" value="4" required></div>
                <div class="form-group"><label>Bars along height (ny)</label><input type="number" name="ny" value="3" required></div>
            </div>
        </div>

        <button type="submit" class="btn-primary">Generate</button>
    </form>

    <div id="results" class="results-panel" style="display:none;">
        <h2>Results</h2>
        <canvas id="rebar-canvas" width="400" height="500"></canvas>
        <div id="results-content"></div>
    </div>
</div>

<script>
document.getElementById('calc-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const payload = {
        width: parseFloat(this.width.value), height: parseFloat(this.height.value),
        cover: parseFloat(this.cover.value), ds: parseFloat(this.ds.value),
        db: parseFloat(this.db.value), nx: parseInt(this.nx.value), ny: parseInt(this.ny.value),
    };
    submitCalc('/api/section/rebar-layout', payload, function(result) {
        drawRebarLayout(result, payload.width, payload.height);
    });
});

function drawRebarLayout(result, secW, secH) {
    const canvas = document.getElementById('rebar-canvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const pad = 40;
    const scale = Math.min((canvas.width-2*pad)/secW, (canvas.height-2*pad)/secH);
    const ox = pad, oy = pad;

    function tx(x){ return ox + x*scale; }
    function ty(y){ return oy + (secH - y)*scale; }

    // Section outline
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
    ctx.strokeRect(tx(0), ty(secH), secW*scale, secH*scale);

    // Stirrups
    const sc = result.stirrup_corners;
    ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 1.5; ctx.setLineDash([6,3]);
    ctx.beginPath();
    ctx.moveTo(tx(sc[0][0]), ty(sc[0][1]));
    for (let i=1; i<sc.length; i++) ctx.lineTo(tx(sc[i][0]), ty(sc[i][1]));
    ctx.closePath(); ctx.stroke(); ctx.setLineDash([]);

    // Rebar
    ctx.fillStyle = '#dc2626';
    result.rebar_coords.forEach(function(pt, i) {
        ctx.beginPath(); ctx.arc(tx(pt[0]), ty(pt[1]), 6, 0, 2*Math.PI); ctx.fill();
        ctx.fillStyle = '#333'; ctx.font = '9px monospace';
        ctx.fillText('R'+(i+1), tx(pt[0])+8, ty(pt[1])-4);
        ctx.fillStyle = '#dc2626';
    });

    ctx.fillStyle = '#333'; ctx.font = '12px monospace';
    ctx.fillText('Total bars: ' + result.total_bars, pad, canvas.height - 10);
}
</script>
{% endblock %}
