{% extends "base.html" %}
{% block title %}Column Interaction & Rebar Layout - ConcreteDesignPy{% endblock %}

{% block content %}
<div class="calc-page">
    <a href="/" class="back-link">&larr; All Calculators</a>
    <h1>Column P-M Interaction Diagram &amp; Rebar Layout</h1>
    <p class="ref">NSCP 2015 / ACI 318-19</p>

    <form id="calc-form" class="calc-form">
        <div class="form-section">
            <h3>Material</h3>
            <div class="form-row">
                <div class="form-group"><label>f'c (MPa)</label><input type="number" name="fc" value="30" step="0.1" required></div>
                <div class="form-group"><label>fy (MPa)</label><input type="number" name="fy" value="415" step="0.1" required></div>
            </div>
        </div>

        <div class="form-section">
            <h3>Section</h3>
            <div class="form-row">
                <div class="form-group"><label>Width, b (mm)</label><input type="number" name="b" value="450" required></div>
                <div class="form-group"><label>Depth, h (mm)</label><input type="number" name="h" value="450" required></div>
                <div class="form-group"><label>Cover (mm)</label><input type="number" name="cover" value="45" required></div>
            </div>
        </div>

        <div class="form-section">
            <h3>Reinforcement</h3>
            <div class="form-row">
                <div class="form-group"><label>Total bars</label><input type="number" name="n_bars" value="12" required></div>
                <div class="form-group"><label>Bar diameter (mm)</label><input type="number" name="d_bar" value="25" required></div>
                <div class="form-group"><label>Bars per side</label><input type="number" name="n_bars_side" value="2" placeholder="auto"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Bars along width (nx)</label><input type="number" name="nx" value="4"></div>
                <div class="form-group"><label>Bars along depth (ny)</label><input type="number" name="ny" value="4"></div>
            </div>
        </div>

        <button type="submit" class="btn-primary">Generate Diagram</button>
    </form>

    <div id="results" class="results-panel" style="display:none;">
        <h2>Results</h2>
        <div class="results-split">
            <div id="svg-pm" class="results-diagram"></div>
            <div id="svg-rebar" class="results-diagram"></div>
        </div>
        <div id="results-content"></div>
        <div id="results-report" class="report-panel"></div>
    </div>
</div>

<script>
document.getElementById('calc-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var f = this;
    var payload = {
        fc: parseFloat(f.fc.value),
        fy: parseFloat(f.fy.value),
        b: parseFloat(f.b.value),
        h: parseFloat(f.h.value),
        cover: parseFloat(f.cover.value),
        n_bars: parseInt(f.n_bars.value),
        d_bar: parseFloat(f.d_bar.value),
        n_bars_side: parseInt(f.n_bars_side.value) || 0,
        nx: parseInt(f.nx.value) || 0,
        ny: parseInt(f.ny.value) || 0,
    };
    submitCalc('/api/column/interaction', payload, function(result) {
        // Render SVG diagrams
        document.getElementById('svg-pm').innerHTML = result.svg_pm || '';
        document.getElementById('svg-rebar').innerHTML = result.svg_rebar || '';

        // LaTeX report
        var r = result;
        var tex = '<h3>Calculation Report</h3><div class="mathjax-report">';
        tex += '<p><b>Given:</b> \\( f\'_c = ' + payload.fc + ' \\text{ MPa} \\), ';
        tex += '\\( f_y = ' + payload.fy + ' \\text{ MPa} \\), ';
        tex += '\\( b = ' + payload.b + ' \\text{ mm} \\), \\( h = ' + payload.h + ' \\text{ mm} \\)</p>';
        tex += '<p>\\( \\beta_1 = ' + r.beta1 + ' \\), ';
        tex += '\\( d_{eff} = ' + r.d_eff + ' \\text{ mm} \\), ';
        tex += '\\( d\' = ' + r.d_prime + ' \\text{ mm} \\)</p>';
        tex += '<p><b>Pure Compression:</b> \\[ P_o = 0.85 f\'_c (A_g - A_{st}) + f_y A_{st} = ' + r.pure_compression_kn + ' \\text{ kN} \\]</p>';
        if (r.balanced_point) {
            tex += '<p><b>Balanced Point:</b> \\( P_n = ' + r.balanced_point.pn + ' \\text{ kN} \\), ';
            tex += '\\( M_n = ' + r.balanced_point.mn + ' \\text{ kN-m} \\)</p>';
        }
        tex += '<p><b>Total Interaction Points:</b> ' + r.points.length + '</p>';
        if (r.rebar_layout) {
            tex += '<p><b>Rebar Layout:</b> ' + r.rebar_layout.total_bars + ' bars total</p>';
        }
        tex += '</div>';
        document.getElementById('results-report').innerHTML = tex;
        if (window.MathJax) MathJax.typeset();
    });
});
</script>
{% endblock %}
