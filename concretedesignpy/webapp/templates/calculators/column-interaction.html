{% extends "base.html" %}
{% block title %}Column Interaction Diagram - ConcreteDesignPy{% endblock %}

{% block content %}
<div class="calc-page">
    <a href="/" class="back-link">&larr; All Calculators</a>
    <h1>Column P-M Interaction Diagram</h1>
    <p class="ref">NSCP 2015 / ACI 318-19</p>

    <form id="calc-form" class="calc-form">
        <div class="form-section">
            <h3>Material</h3>
            <div class="form-row">
                <div class="form-group"><label>f'c (MPa)</label><input type="number" name="fc" value="30" step="0.1" required></div>
                <div class="form-group"><label>fy (MPa)</label><input type="number" name="fy" value="415" step="0.1" required></div>
            </div>
        </div>

        <div class="form-section">
            <h3>Section</h3>
            <div class="form-row">
                <div class="form-group"><label>Width, b (mm)</label><input type="number" name="b" value="450" required></div>
                <div class="form-group"><label>Depth, h (mm)</label><input type="number" name="h" value="450" required></div>
                <div class="form-group"><label>Cover (mm)</label><input type="number" name="cover" value="45" required></div>
            </div>
        </div>

        <div class="form-section">
            <h3>Reinforcement</h3>
            <div class="form-row">
                <div class="form-group"><label>Total bars</label><input type="number" name="n_bars" value="12" required></div>
                <div class="form-group"><label>Bar diameter (mm)</label><input type="number" name="d_bar" value="25" required></div>
                <div class="form-group"><label>Bars per side</label><input type="number" name="n_bars_side" value="2" placeholder="auto"></div>
            </div>
        </div>

        <button type="submit" class="btn-primary">Generate Diagram</button>
    </form>

    <div id="results" class="results-panel" style="display:none;">
        <h2>Results</h2>
        <canvas id="pm-chart" width="600" height="400"></canvas>
        <div id="results-content"></div>
    </div>
</div>

<script>
document.getElementById('calc-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const payload = {
        fc: parseFloat(this.fc.value),
        fy: parseFloat(this.fy.value),
        b: parseFloat(this.b.value),
        h: parseFloat(this.h.value),
        cover: parseFloat(this.cover.value),
        n_bars: parseInt(this.n_bars.value),
        d_bar: parseFloat(this.d_bar.value),
        n_bars_side: parseInt(this.n_bars_side.value) || 0,
    };
    submitCalc('/api/column/interaction', payload, function(result) {
        drawPMDiagram(result.points);
    });
});

function drawPMDiagram(points) {
    const canvas = document.getElementById('pm-chart');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!points || points.length === 0) return;

    const mn = points.map(p => p.mn);
    const pn = points.map(p => p.pn);
    const maxM = Math.max(...mn) * 1.1;
    const maxP = Math.max(...pn) * 1.1;
    const minP = Math.min(...pn, 0) * 1.1;
    const rangeP = maxP - minP;

    const pad = 50;
    const w = canvas.width - 2 * pad;
    const h = canvas.height - 2 * pad;

    // Axes
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad, pad);
    ctx.lineTo(pad, pad + h);
    ctx.lineTo(pad + w, pad + h);
    ctx.stroke();

    ctx.font = '12px monospace';
    ctx.fillStyle = '#333';
    ctx.fillText('Mn (kN-m)', pad + w / 2, pad + h + 35);
    ctx.save();
    ctx.translate(12, pad + h / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText('Pn (kN)', 0, 0);
    ctx.restore();

    // Plot points
    ctx.fillStyle = '#2563eb';
    ctx.strokeStyle = '#2563eb';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < points.length; i++) {
        const x = pad + (mn[i] / maxM) * w;
        const y = pad + h - ((pn[i] - minP) / rangeP) * h;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.stroke();
    for (let i = 0; i < points.length; i++) {
        const x = pad + (mn[i] / maxM) * w;
        const y = pad + h - ((pn[i] - minP) / rangeP) * h;
        ctx.beginPath();
        ctx.arc(x, y, 2, 0, 2 * Math.PI);
        ctx.fill();
    }
}
</script>
{% endblock %}
