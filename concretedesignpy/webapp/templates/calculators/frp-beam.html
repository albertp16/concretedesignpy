{% extends "base.html" %}
{% block title %}FRP Beam Strengthening - ConcreteDesignPy{% endblock %}

{% block content %}
<div class="calc-page">
    <a href="/" class="back-link">&larr; All Calculators</a>
    <h1>FRP Flexural Strengthening</h1>
    <p class="ref">ACI 440R-17 / NSCP 2015</p>

    <form id="calc-form" class="calc-form">
        <div class="form-section">
            <h3>Existing Beam</h3>
            <div class="form-row">
                <div class="form-group"><label>Width, b (mm)</label><input type="number" name="b" value="305" required></div>
                <div class="form-group"><label>Eff. depth, d (mm)</label><input type="number" name="d" value="546" required></div>
                <div class="form-group"><label>Height, h (mm)</label><input type="number" name="h" value="609.6" required></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>f'c (MPa)</label><input type="number" name="fc" value="34.5" step="0.1" required></div>
                <div class="form-group"><label>fy (MPa)</label><input type="number" name="fy" value="414" step="0.1" required></div>
                <div class="form-group"><label>As steel (mm&sup2;)</label><input type="number" name="as_steel" value="1927" step="1" required></div>
            </div>
        </div>

        <div class="form-section">
            <h3>Design Requirement</h3>
            <div class="form-row">
                <div class="form-group"><label>Mu required (kN-m)</label><input type="number" name="mu_required" value="399" step="0.1" required></div>
                <div class="form-group"><label>MDL service (kN-m)</label><input type="number" name="mdl" value="97.63" step="0.01"></div>
            </div>
        </div>

        <div class="form-section">
            <h3>FRP Properties</h3>
            <div class="form-row">
                <div class="form-group"><label>tf per ply (mm)</label><input type="number" name="tf" value="1.02" step="0.01" required></div>
                <div class="form-group"><label>f*fu (MPa)</label><input type="number" name="ffu_star" value="621" step="1" required></div>
                <div class="form-group"><label>e*fu (mm/mm)</label><input type="number" name="efu_star" value="0.015" step="0.001" required></div>
                <div class="form-group"><label>Ef (MPa)</label><input type="number" name="ef_frp" value="37000" step="100" required></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Number of plies</label><input type="number" name="n_plies" value="2" required></div>
                <div class="form-group">
                    <label>Exposure</label>
                    <select name="exposure">
                        <option value="interior" selected>Interior</option>
                        <option value="exterior">Exterior</option>
                        <option value="aggressive">Aggressive</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Fiber Type</label>
                    <select name="fiber">
                        <option value="carbon" selected>Carbon</option>
                        <option value="glass">Glass</option>
                        <option value="aramid">Aramid</option>
                    </select>
                </div>
            </div>
        </div>

        <button type="submit" class="btn-primary">Calculate</button>
    </form>

    <div id="results" class="results-panel" style="display:none;">
        <h2>Results</h2>
        <div id="results-content"></div>
    </div>
</div>

<script>
document.getElementById('calc-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const f = this;
    const payload = {
        b: parseFloat(f.b.value), d: parseFloat(f.d.value), h: parseFloat(f.h.value),
        fc: parseFloat(f.fc.value), fy: parseFloat(f.fy.value),
        as_steel: parseFloat(f.as_steel.value), mu_required: parseFloat(f.mu_required.value),
        tf: parseFloat(f.tf.value), ffu_star: parseFloat(f.ffu_star.value),
        efu_star: parseFloat(f.efu_star.value), ef_frp: parseFloat(f.ef_frp.value),
        n_plies: parseInt(f.n_plies.value), exposure: f.exposure.value, fiber: f.fiber.value,
        mdl: parseFloat(f.mdl.value),
    };
    submitCalc('/api/frp/beam', payload);
});
</script>
{% endblock %}
