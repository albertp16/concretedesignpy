{% extends "base.html" %}
{% block title %}Beam Moment Capacity - ConcreteDesignPy{% endblock %}

{% block content %}
<div class="calc-page">
    <a href="/" class="back-link">&larr; All Calculators</a>
    <h1>Beam Moment Capacity</h1>
    <p class="ref">NSCP 2015 / ACI 318-19 &mdash; Strain Compatibility Method</p>

    <form id="calc-form" class="calc-form">
        <div class="form-section">
            <h3>Material Properties</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>f'c (MPa)</label>
                    <input type="number" name="fc" value="20.68" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>fy (MPa)</label>
                    <input type="number" name="fy" value="414" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Es (MPa)</label>
                    <input type="number" name="es" value="200000" step="1">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>Section Geometry</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Width, b (mm)</label>
                    <input type="number" name="b" value="200" step="1" required>
                </div>
                <div class="form-group">
                    <label>Height, h (mm)</label>
                    <input type="number" name="h" value="400" step="1" required>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>Reinforcement</h3>
            <div id="rebar-rows">
                <div class="rebar-row form-row">
                    <div class="form-group">
                        <label>Depth, d (mm)</label>
                        <input type="number" name="rebar_d[]" value="60" step="1">
                    </div>
                    <div class="form-group">
                        <label>Diameter (mm)</label>
                        <input type="number" name="rebar_diam[]" value="16" step="1">
                    </div>
                    <div class="form-group">
                        <label>Number</label>
                        <input type="number" name="rebar_num[]" value="2" step="1">
                    </div>
                </div>
                <div class="rebar-row form-row">
                    <div class="form-group">
                        <label>Depth, d (mm)</label>
                        <input type="number" name="rebar_d[]" value="340" step="1">
                    </div>
                    <div class="form-group">
                        <label>Diameter (mm)</label>
                        <input type="number" name="rebar_diam[]" value="16" step="1">
                    </div>
                    <div class="form-group">
                        <label>Number</label>
                        <input type="number" name="rebar_num[]" value="3" step="1">
                    </div>
                </div>
            </div>
            <button type="button" id="add-rebar" class="btn-secondary">+ Add Rebar Layer</button>
        </div>

        <button type="submit" class="btn-primary">Calculate</button>
    </form>

    <div id="results" class="results-panel" style="display:none;">
        <h2>Results</h2>
        <div id="results-content"></div>
    </div>
</div>

<script>
document.getElementById('add-rebar').addEventListener('click', function() {
    const container = document.getElementById('rebar-rows');
    const row = document.createElement('div');
    row.className = 'rebar-row form-row';
    row.innerHTML = `
        <div class="form-group">
            <label>Depth, d (mm)</label>
            <input type="number" name="rebar_d[]" value="0" step="1">
        </div>
        <div class="form-group">
            <label>Diameter (mm)</label>
            <input type="number" name="rebar_diam[]" value="16" step="1">
        </div>
        <div class="form-group">
            <label>Number</label>
            <input type="number" name="rebar_num[]" value="2" step="1">
        </div>`;
    container.appendChild(row);
});

document.getElementById('calc-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const depths = document.querySelectorAll('input[name="rebar_d[]"]');
    const diams = document.querySelectorAll('input[name="rebar_diam[]"]');
    const nums = document.querySelectorAll('input[name="rebar_num[]"]');
    const rebar_list = [];
    for (let i = 0; i < depths.length; i++) {
        rebar_list.push({
            d: parseFloat(depths[i].value),
            diam: parseFloat(diams[i].value),
            num: parseInt(nums[i].value)
        });
    }
    const payload = {
        fc: parseFloat(this.fc.value),
        fy: parseFloat(this.fy.value),
        es: parseFloat(this.es.value),
        b: parseFloat(this.b.value),
        h: parseFloat(this.h.value),
        rebar_list: rebar_list
    };
    submitCalc('/api/beam/moment', payload);
});
</script>
{% endblock %}
